name: Deploy to GitHub Pages
# Every push to main rebuilds the live site. No more manual regeneration that
# clobbers committed changes — main IS the deployed source.
on:
  push:
    branches: [main]
  workflow_dispatch: {}
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: {path: '.'}          # static site at repo root
      - id: deployment
        uses: actions/deploy-pages@v4
